<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERREUR 404 - SYSTEM COMPROMISED</title>
    <style>
        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 2px solid #0f0;
            padding: 30px;
            box-shadow: 0 0 15px #0f0;
            max-width: 500px;
            width: 90%;
        }
        h1 { color: red; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
        input {
            background-color: #000;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 10px;
            margin: 10px 0;
            width: calc(100% - 22px);
            font-family: inherit;
            text-transform: uppercase;
        }
        button {
            background-color: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            margin-top: 15px;
            width: 100%;
        }
        button:hover { background-color: #fff; }
        .error-msg { color: red; margin-top: 15px; display: none; }
        .hint { font-size: 0.9em; color: #aaa; margin: 5px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠ ALERTE ROUGE ⚠</h1>
        <p><strong>Serveur Polymobyl hors ligne.</strong></p>
        
        <div style="margin: 20px 0; border: 1px dashed #0f0; padding: 10px;">
            <p class="hint">"Mon nom est celui qui régit... avec la première lettre de mon prénom au début"</p>
            <p class="hint">"Je suis né le jour où l'entreprise c'est créée..."</p>
            <p class="hint">"...et ma femme a inspiré ma sécurité."</p>
        </div>

        <h3>ACCÈS ADMINISTRATEUR</h3>
        <input type="text" id="username" placeholder="Identifiant du pirate">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="checkLogin()">RESTAURER LE SYSTÈME</button>
        <p class="error-msg" id="errorMsg">Accès refusé. Données corrompues.</p>
    </div>

    <script>
        function checkLogin() {
            // On récupère les valeurs et on les force en majuscules sans espaces
            const user = document.getElementById('username').value.trim().toUpperCase();
            const pass = document.getElementById('password').value.trim().toUpperCase();
            const errorMsg = document.getElementById('errorMsg');

            // Vérification des codes
            if (user === 'SPASCAL' && pass === '1986ALEXANDRA') {
                // REDIRECTION EN CAS DE SUCCÈS
                window.location.href = "https://www.polymobyl.com/qui-sommes-nous/"; 
            } else {
                // MESSAGE D'ERREUR
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        }
    </script>
</body>
</html>
